</head>

        const envCheck = document.getElementById('env-check');
        envCheck.innerHTML = `
            <h2>Environment Variables Status:</h2>
            <ul>
                <li>API Key: ${import.meta.env.VITE_FIREBASE_API_KEY ? '✅ Loaded' : '❌ Missing'}</li>
                <li>Project ID: ${import.meta.env.VITE_FIREBASE_PROJECT_ID ? '✅ Loaded' : '❌ Missing'}</li>
            </ul>
        `;
    </script>
</body>
</html>
